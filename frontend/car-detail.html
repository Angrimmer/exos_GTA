<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CAR DETAIL</title>
  <!-- mêmes fonts/styles que le dashboard -->
</head>
<body>
  <header>
    <a href="cars-dashboard.html" class="back-btn">← BACK</a>
    <div class="logo">GARAGE<span>//</span>DB</div>
  </header>

  <main id="detail-wrap">
    <div class="loading"><div class="spinner"></div>LOADING...</div>
  </main>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #f0f0f0;
    --muted: #555;
    --legendary: #f59e0b;
    --rare: #6366f1;
    --common: #10b981;
    --speed-bar: #e8ff47;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  /* NOISE OVERLAY — même que le dashboard */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.15em;
    line-height: 1;
  }
  .logo span { color: var(--accent); }

  .back-btn {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 0.5rem 1rem;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* DETAIL WRAP */
  #detail-wrap {
    padding: 3rem;
    max-width: 860px;
  }

  /* ID + BADGE */
  .detail-id {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
  }

  /* NOM */
  .car-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  /* BRAND */
  .car-brand {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  /* TYPE */
  .car-type {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.2rem 0.6rem;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  /* RARITY BADGE */
  .rarity-badge {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    margin-bottom: 2rem;
    margin-left: 0.5rem;
  }
  .rarity-badge.legendary { background: rgba(245,158,11,0.15); color: var(--legendary); border: 1px solid rgba(245,158,11,0.3); }
  .rarity-badge.rare      { background: rgba(99,102,241,0.15);  color: #818cf8;          border: 1px solid rgba(99,102,241,0.3); }
  .rarity-badge.common    { background: rgba(16,185,129,0.15);  color: #34d399;          border: 1px solid rgba(16,185,129,0.3); }
  .rarity-badge.uncommon  { background: rgba(56,189,248,0.15);  color: #7dd3fc;          border: 1px solid rgba(56,189,248,0.3); }

  /* DIVIDER */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  /* STATS GRID */
  .car-stats {
    list-style: none;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .car-stats li {
    background: var(--surface);
    padding: 1.2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .car-stats li span {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .car-stats li strong {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.06em;
    font-weight: normal;
    color: var(--accent);
  }

  /* SPEED BAR */
  .speed-section { margin-top: 2rem; }

  .speed-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }
  .speed-label span:last-child { color: var(--text); }

  .speed-track {
    height: 3px;
    background: var(--border);
    overflow: hidden;
  }
  .speed-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* LOADING / ERROR */
  .loading {
    padding: 6rem 0;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state { padding: 4rem 0; text-align: center; }
  .error-code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    line-height: 1;
  }
  .error-msg { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 0.5rem; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header { padding: 1.5rem; }
    #detail-wrap { padding: 1.5rem; }
    .car-name { font-size: 3.5rem; }
  }
</style>


  <script>
const id = new URLSearchParams(window.location.search).get('id');

if (!id) {
  document.getElementById('detail-wrap').innerHTML = '<p>ID manquant</p>';
} else {
  fetch(`http://localhost:3000/api/vehicles/${id}`)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    })
    .then(car => {
      const rar = (car.rarity || 'common').toLowerCase();
      document.title = car.name + ' // GARAGE DB';
      document.getElementById('detail-wrap').innerHTML = `
        <div class="car-detail">
          <div class="detail-id">#${String(car.id).padStart(4, '0')}</div>
          <h1 class="car-name">${car.name}</h1>
          <div class="car-brand">${car.brand || '—'}</div>
          <div class="car-type">${car.type || '—'}</div>
          <span class="rarity-badge ${rar}">${rar}</span>
          <hr class="divider" />
          <ul class="car-stats">
            ><span>MAX SPEED</span><strong>${car.max_speed ? car.max_speed + ' KM/H' : '—'}</strong></li>
            ><span>PRICE</span><strong>$${car.price || '0'}</strong></li>
            ><span>ADDED</span><strong>${car.created_at ? new Date(car.created_at).toLocaleDateString() : '—'}</strong></li>
          </ul>
          <div class="speed-section">
            <div class="speed-label">
              <span>MAX SPEED</span>
              <span>${car.max_speed ? car.max_speed + ' KM/H' : '—'}</span>
            </div>
            <div class="speed-track">
              <div class="speed-fill" id="speed-fill" data-pct="${car.max_speed ? Math.round((car.max_speed / 1200) * 100) : 0}"></div>
            </div>
          </div>
        </div>
      `;

      // Animer la barre de vitesse (max référence = 1200 km/h = Hydra)
      requestAnimationFrame(() => {
        const fill = document.getElementById('speed-fill');
        if (fill) fill.style.width = fill.dataset.pct + '%';
      });
    })
    .catch(err => {
      document.getElementById('detail-wrap').innerHTML = `
        <div class="error-state">
          <div class="error-code">ERR</div>
          <div class="error-msg">${err.message}</div>
        </div>`;
    });
}

  </script>
</body>
</html>
